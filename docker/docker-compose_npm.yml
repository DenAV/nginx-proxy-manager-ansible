# Nginx Proxy Manager — Docker Compose
# Docs: https://github.com/DenAV/nginx-proxy-manager-ansible/tree/main/docker

services:
  app:
    image: 'jc21/nginx-proxy-manager:${IMAGE_TAG:-2.11.3}'
    container_name: npm-app
    hostname: npm
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - npm-data:/data
      - npm-letsencrypt:/etc/letsencrypt
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/bin/check-health"]
      interval: 10s
      timeout: 3s
    networks:
      - npm
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  swagger-ui:
    image: swaggerapi/swagger-ui:v5.21.0
    container_name: npm-swagger-ui
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      API_URL: http://app:81/api/schema
    depends_on:
      - app
    networks:
      - npm
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

networks:
  npm:
    name: npm
    driver: bridge

volumes:
  npm-data:
  npm-letsencrypt:
